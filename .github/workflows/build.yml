# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # Cache node_modules keyed to the exact lockfile — skips npm ci on cache hit
    - name: Cache node_modules
      id: cache-node-modules
      uses: actions/cache@v3
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      run: npm ci

    # Cache generated IDL types keyed to the IDL version in package.json
    - name: Cache generated IDL
      id: cache-idl
      uses: actions/cache@v3
      with:
        path: src/__generated__
        key: ${{ runner.os }}-idl-${{ hashFiles('package.json') }}

    - name: Generate IDL
      if: steps.cache-idl.outputs.cache-hit != 'true'
      run: npm run install-idl && npm run generate:idl

    - run: npm run lint
    - run: npm run typecheck
    - run: npm run test
    - run: npx next@14 build --experimental-build-mode compile
